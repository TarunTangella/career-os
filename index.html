{title:'Python data structures for AI',desc:'Lists, dicts, sets — how AI pipelines actually use them',time:'45 min',tags:['Python','Beginner'],content:`
## What you'll build
A mini data pipeline that reads a list of loan documents, classifies them by type using a dictionary lookup, deduplicates using sets, and outputs a structured summary — the same pattern used in real IDP (Intelligent Document Processing) pipelines.

## Prerequisites
\`\`\`bash
pip install python==3.11  # already installed — no extras needed
\`\`\`

## Concept in 2 minutes
AI pipelines are mostly data transformation: take raw input → clean → structure → pass to model → parse output. Lists hold sequences. Dicts map keys to values (document type → processor). Sets remove duplicates fast. Master these three and you can build 80% of any AI pipeline's data layer.

## Step 1: Set up your document pipeline
\`\`\`python
# document_pipeline.py

# Simulated incoming documents (real-world: these come from FileNet, email, API)
raw_docs = [
    {"id": "D001", "filename": "salary_slip_jan.pdf", "type": "unknown"},
    {"id": "D002", "filename": "bank_statement_feb.pdf", "type": "unknown"},
    {"id": "D003", "filename": "salary_slip_jan.pdf", "type": "unknown"},  # duplicate
    {"id": "D004", "filename": "emirates_id_front.jpg", "type": "unknown"},
    {"id": "D005", "filename": "trade_license_2024.pdf", "type": "unknown"},
]

print(f"Total documents received: {len(raw_docs)}")
\`\`\`
**Expected output:**
\`\`\`
Total documents received: 5
\`\`\`

## Step 2: Classify documents using a dictionary
\`\`\`python
# Keyword-to-type mapping — this is the simplest classifier
# In production: replace with an LLM call
DOC_CLASSIFIER = {
    "salary": "salary_slip",
    "bank_statement": "bank_statement",
    "emirates_id": "identity_doc",
    "passport": "identity_doc",
    "trade_license": "business_doc",
    "tenancy": "address_proof",
    "utility": "address_proof",
}

def classify_doc(filename: str) -> str:
    filename_lower = filename.lower()
    for keyword, doc_type in DOC_CLASSIFIER.items():
        if keyword in filename_lower:
            return doc_type
    return "unknown"

# Apply classifier to all docs
for doc in raw_docs:
    doc["type"] = classify_doc(doc["filename"])
    print(f"{doc['filename']:35} → {doc['type']}")
\`\`\`
**Expected output:**
\`\`\`
salary_slip_jan.pdf                 → salary_slip
bank_statement_feb.pdf              → bank_statement
salary_slip_jan.pdf                 → salary_slip
emirates_id_front.jpg               → identity_doc
trade_license_2024.pdf              → business_doc
\`\`\`

## Step 3: Deduplicate using sets
\`\`\`python
# Track seen filenames — sets automatically prevent duplicates
seen_files = set()
unique_docs = []

for doc in raw_docs:
    if doc["filename"] not in seen_files:
        seen_files.add(doc["filename"])
        unique_docs.append(doc)
    else:
        print(f"⚠️  Duplicate removed: {doc['filename']}")

print(f"\nAfter dedup: {len(unique_docs)} unique documents")
\`\`\`
**Expected output:**
\`\`\`
⚠️  Duplicate removed: salary_slip_jan.pdf
After dedup: 4 unique documents
\`\`\`

## Step 4: Group by type using dict of lists
\`\`\`python
from collections import defaultdict

# Group documents by type — common pattern in any document processing system
grouped = defaultdict(list)
for doc in unique_docs:
    grouped[doc["type"]].append(doc["id"])

print("\n📁 Document summary by type:")
for doc_type, ids in grouped.items():
    print(f"  {doc_type:20}: {len(ids)} doc(s) → {ids}")
\`\`\`
**Expected output:**
\`\`\`
📁 Document summary by type:
  salary_slip         : 1 doc(s) → ['D001']
  bank_statement      : 1 doc(s) → ['D002']
  identity_doc        : 1 doc(s) → ['D004']
  business_doc        : 1 doc(s) → ['D005']
\`\`\`

## ✅ Checkpoint
You now have a working mini-pipeline: receive → classify → deduplicate → group. This is the exact data layer that sits before any LLM in a document intelligence system.

## Real-world variation
In the SIB-style IDP system, this same pattern handles 13 document types across auto finance applications. The classifier dict gets replaced by an LLM call, but the list/dict/set structure stays identical.

## Common errors and fixes
- **KeyError on dict access** → Use \`dict.get(key, default)\` instead of \`dict[key]\`
- **Set not removing duplicates** → Sets compare by value; if docs are dicts, convert the key field to a string first
- **defaultdict import error** → \`from collections import defaultdict\` — it's in stdlib, no pip needed

## What to build next
Add a JSON export: \`json.dump(grouped, open('output.json','w'), indent=2)\` — then you're one step away from passing this to an LLM for extraction.

## What you'll build
A Python script that calls three different LLM APIs (Ollama local, OpenAI, Anthropic) with the same prompt — a loan document field extractor — so you understand the pattern once and can switch providers.

## Prerequisites
\`\`\`bash
pip install anthropic==0.25.0 openai==1.30.0 requests==2.31.0
# For Ollama (free, local): install from https://ollama.com then run: ollama pull llama3.2
\`\`\`

## Concept in 2 minutes
Every LLM API is the same pattern: send a list of messages → get text back. The differences are just auth headers and field names. Once you know the pattern, switching between providers takes 5 minutes.

## Step 1: Call Ollama (free, local, no key needed)
\`\`\`python
# ollama_call.py — works offline, completely free
import requests, json

def call_ollama(prompt: str, model: str = "llama3.2") -> str:
    response = requests.post(
        "http://localhost:11434/api/generate",
        json={"model": model, "prompt": prompt, "stream": False}
    )
    return response.json()["response"]

# Test with a real document extraction task
prompt = """Extract these fields from the text below. Return JSON only.
Fields: applicant_name, monthly_salary, employer_name, date

Text: "This is to certify that Mr. Ahmed Al-Rashidi is employed at Gulf Finance Corp 
as Senior Engineer with a monthly salary of AED 18,500 effective from March 2024."
"""

result = call_ollama(prompt)
print("Ollama response:")
print(result)
\`\`\`
**Expected output:**
\`\`\`json
{
  "applicant_name": "Ahmed Al-Rashidi",
  "monthly_salary": "AED 18,500",
  "employer_name": "Gulf Finance Corp",
  "date": "March 2024"
}
\`\`\`

## Step 2: Call Anthropic Claude API
\`\`\`python
import anthropic

client = anthropic.Anthropic(api_key="sk-ant-...")  # your key here

def call_claude(prompt: str) -> str:
    message = client.messages.create(
        model="claude-sonnet-4-6",
        max_tokens=500,
        messages=[{"role": "user", "content": prompt}]
    )
    return message.content[0].text

result = call_claude(prompt)
print("Claude response:", result)
\`\`\`

## Step 3: Build a unified wrapper (use any provider)
\`\`\`python
# unified_llm.py — switch provider with one variable
import os, requests, json

PROVIDER = "ollama"  # change to "anthropic" or "openai"

def llm(prompt: str) -> str:
    if PROVIDER == "ollama":
        r = requests.post("http://localhost:11434/api/generate",
            json={"model": "llama3.2", "prompt": prompt, "stream": False})
        return r.json()["response"]
    
    elif PROVIDER == "anthropic":
        import anthropic
        c = anthropic.Anthropic(api_key=os.getenv("ANTHROPIC_API_KEY"))
        m = c.messages.create(model="claude-sonnet-4-6", max_tokens=500,
            messages=[{"role": "user", "content": prompt}])
        return m.content[0].text
    
    elif PROVIDER == "openai":
        from openai import OpenAI
        c = OpenAI(api_key=os.getenv("OPENAI_API_KEY"))
        r = c.chat.completions.create(model="gpt-4o-mini", max_tokens=500,
            messages=[{"role": "user", "content": prompt}])
        return r.choices[0].message.content

# Use it
print(llm("Summarise this in one sentence: Banks assess loan eligibility based on income, credit score, and debt-to-income ratio."))
\`\`\`
**Expected output:**
\`\`\`
Banks evaluate loan applications by examining applicants' income levels, credit history, and the ratio of their existing debt to income.
\`\`\`

## ✅ Checkpoint
You can now call any LLM from Python. The \`llm()\` wrapper is the foundation of every AI feature you'll build.

## Common errors and fixes
- **ConnectionError on Ollama** → Run \`ollama serve\` in a terminal first, then \`ollama pull llama3.2\`
- **AuthenticationError** → API key not set — use \`os.getenv()\` with environment variables, never hardcode
- **JSONDecodeError on LLM output** → LLMs don't always return valid JSON. Wrap in try/except and retry once

## What to build next
Add a system prompt: \`messages=[{"role":"system","content":"You are a banking document analyst..."},{"role":"user","content":prompt}]\` — this dramatically improves extraction accuracy.

## References
- 🔗 [Ollama docs](https://ollama.com/library)
- 🔗 [Anthropic Python SDK](https://github.com/anthropics/anthropic-sdk-python)
- 🔗 [OpenAI Python cookbook](https://cookbook.openai.com)
`},
],

{title:'What RAG is and why it matters',desc:'The concept, architecture, and when to use it — with real analogies',time:'30 min',tags:['Concept','Beginner'],content:`
## What is RAG?
RAG = Retrieval Augmented Generation. It solves one problem: **LLMs don't know your private data.**

A base LLM knows everything from its training data (up to a cutoff date) but knows nothing about your company's loan policies, your client's documents, or your internal knowledge base. RAG fixes this.

## The analogy
Think of it like an open-book exam vs a closed-book exam:
- **Without RAG:** LLM answers from memory only — may hallucinate or say "I don't know"
- **With RAG:** Before answering, the LLM first looks up relevant pages from your private documents, then answers using that context — accurate, grounded, verifiable

## The 3-step architecture
\`\`\`
INDEXING (done once)
Your documents → Split into chunks → Convert to vectors → Store in vector DB

RETRIEVAL (at query time)
User question → Convert to vector → Find similar chunks → Return top-K chunks

GENERATION (at query time)
User question + Retrieved chunks → LLM → Answer grounded in your documents
\`\`\`

## When to use RAG vs fine-tuning
| Situation | Use |
|---|---|
| Private documents change frequently | RAG |
| Need to cite sources | RAG |
| Domain-specific knowledge base | RAG |
| Want to change model behaviour/personality | Fine-tuning |
| Want model to learn new skills | Fine-tuning |
| Banking document Q&A | RAG ✅ |

## Real banking example
**Problem:** A loan officer asks: "What is our policy on DBR (Debt Burden Ratio) for personal loans to non-residents?"

**Without RAG:** LLM guesses based on general banking knowledge — wrong for your specific bank's policy.

**With RAG:**
1. Question is converted to a vector
2. Vector DB finds the 3 most relevant chunks from your policy PDF
3. LLM reads those chunks + answers accurately: "Per Section 4.2 of the Personal Loan Policy (2024), DBR for non-residents is capped at 35%..."

## What you'll learn in the next labs
1. How to split documents into chunks
2. How to convert text to vectors (embeddings)
3. How to store and search vectors
4. How to build the full pipeline end-to-end

## References
- 🔗 [Anthropic — RAG overview](https://docs.anthropic.com/en/docs/build-with-claude/retrieval-augmented-generation)
- 🔗 [LangChain RAG tutorial](https://python.langchain.com/docs/tutorials/rag/)
- 🔗 [RAG paper (original)](https://arxiv.org/abs/2005.11401)
`},

{title:'Build a simple RAG pipeline',desc:'End-to-end: load → embed → store → retrieve → answer',time:'2 hr',tags:['RAG','Build','Core'],content:`
## What you'll build
A working RAG system that answers questions about a bank's loan policy PDF. By the end you'll have a script you can point at any document and query it in natural language.

## Prerequisites
\`\`\`bash
pip install langchain==0.2.16 langchain-community==0.2.16 chromadb==0.5.3 sentence-transformers==3.0.1 pypdf==4.3.1
# For local LLM (free): install Ollama + run: ollama pull llama3.2
\`\`\`

## Step 1: Create a sample policy document
\`\`\`python
# Create sample_policy.txt (or use your own PDF)
policy_text = """
PERSONAL LOAN POLICY — GULF ISLAMIC BANK
Effective Date: January 2024

Section 1: Eligibility
- Minimum age: 21 years
- Maximum age at loan maturity: 65 years (salaried), 70 years (self-employed)
- Minimum monthly salary: AED 5,000

Section 2: Debt Burden Ratio (DBR)
- Maximum DBR for UAE nationals: 50%
- Maximum DBR for expatriates: 45%
- Maximum DBR for non-residents: 35%
- DBR = Total monthly obligations / Gross monthly salary

Section 3: Loan Limits
- Minimum loan amount: AED 10,000
- Maximum loan amount: 20x monthly salary or AED 1,500,000 (whichever is lower)
- Maximum tenor: 48 months for expatriates, 60 months for nationals

Section 4: Required Documents
- Valid Emirates ID or passport
- 3 months bank statements
- 3 months salary slips
- Employment confirmation letter
"""

with open("sample_policy.txt", "w") as f:
    f.write(policy_text)
print("✅ Policy document created")
\`\`\`

## Step 2: Load and chunk the document
\`\`\`python
from langchain.text_splitter import RecursiveCharacterTextSplitter
from langchain_community.document_loaders import TextLoader

# Load document
loader = TextLoader("sample_policy.txt")
docs = loader.load()
print(f"Loaded: {len(docs)} document(s)")

# Split into chunks
splitter = RecursiveCharacterTextSplitter(
    chunk_size=300,       # characters per chunk
    chunk_overlap=50,     # overlap to preserve context at boundaries
    separators=["\n\n", "\n", ". ", " "]  # try these split points in order
)
chunks = splitter.split_documents(docs)
print(f"Split into: {len(chunks)} chunks")
for i, chunk in enumerate(chunks[:3]):
    print(f"\nChunk {i}: {chunk.page_content[:100]}...")
\`\`\`
**Expected output:**
\`\`\`
Loaded: 1 document(s)
Split into: 8 chunks
Chunk 0: PERSONAL LOAN POLICY — GULF ISLAMIC BANK
Effective Date: January 2024...
\`\`\`

## Step 3: Create embeddings and store in ChromaDB
\`\`\`python
from langchain_community.embeddings import HuggingFaceEmbeddings
from langchain_community.vectorstores import Chroma

# Use a free local embedding model (no API key needed)
embeddings = HuggingFaceEmbeddings(
    model_name="all-MiniLM-L6-v2",  # 80MB, downloads once, runs locally
    model_kwargs={"device": "cpu"}
)

# Store in ChromaDB (local, no server needed)
vectorstore = Chroma.from_documents(
    documents=chunks,
    embedding=embeddings,
    persist_directory="./policy_db"  # saves to disk
)
print(f"✅ Stored {len(chunks)} chunks in ChromaDB")
\`\`\`
**Expected output:**
\`\`\`
✅ Stored 8 chunks in ChromaDB
\`\`\`

## Step 4: Query and retrieve relevant chunks
\`\`\`python
# Test retrieval before adding LLM
query = "What is the maximum DBR for expatriates?"
retrieved = vectorstore.similarity_search(query, k=2)

print(f"Query: {query}")
print(f"Retrieved {len(retrieved)} chunks:\n")
for i, doc in enumerate(retrieved):
    print(f"--- Chunk {i+1} ---")
    print(doc.page_content)
\`\`\`
**Expected output:**
\`\`\`
Query: What is the maximum DBR for expatriates?
Retrieved 2 chunks:

--- Chunk 1 ---
Section 2: Debt Burden Ratio (DBR)
- Maximum DBR for UAE nationals: 50%
- Maximum DBR for expatriates: 45%
...
\`\`\`

## Step 5: Add LLM to answer with context
\`\`\`python
import requests

def answer_with_rag(question: str) -> str:
    # 1. Retrieve relevant chunks
    docs = vectorstore.similarity_search(question, k=3)
    context = "\n\n".join([d.page_content for d in docs])
    
    # 2. Build prompt with context
    prompt = f"""You are a banking policy assistant. Answer the question using ONLY the policy context below.
If the answer is not in the context, say "Not covered in policy."

POLICY CONTEXT:
{context}

QUESTION: {question}
ANSWER:"""
    
    # 3. Call Ollama (replace with any LLM)
    r = requests.post("http://localhost:11434/api/generate",
        json={"model": "llama3.2", "prompt": prompt, "stream": False})
    return r.json()["response"]

# Test it
questions = [
    "What is the maximum loan tenor for expatriates?",
    "What DBR applies to non-residents?",
    "What documents are required?",
]
for q in questions:
    print(f"Q: {q}")
    print(f"A: {answer_with_rag(q)}\n")
\`\`\`
**Expected output:**
\`\`\`
Q: What is the maximum loan tenor for expatriates?
A: According to the policy, the maximum tenor for expatriates is 48 months.

Q: What DBR applies to non-residents?
A: The maximum DBR for non-residents is 35%.
\`\`\`

## ✅ You now have a working RAG system
Point it at any document. Change the policy file, re-run Step 3, and it works for any domain.

## Common errors and fixes
- **Model download hangs** → \`all-MiniLM-L6-v2\` is 80MB. First run takes 2-3 min. Check your internet.
- **Ollama connection refused** → Run \`ollama serve\` in a separate terminal window first
- **Poor retrieval quality** → Reduce chunk_size to 150, increase k to 5

## What to build next
Replace \`TextLoader\` with \`PyPDFLoader\` for real PDFs: \`from langchain_community.document_loaders import PyPDFLoader\`

## References
- 🔗 [LangChain RAG docs](https://python.langchain.com/docs/tutorials/rag/)
- 🔗 [ChromaDB docs](https://docs.trychroma.com)
- 🔗 [all-MiniLM model card](https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2)
`},
],

vectordb:[
{title:'Vector databases explained clearly',desc:'What vectors are, why semantic search beats keyword search',time:'30 min',tags:['Concept','Beginner'],content:`
## What is a vector?
A vector is just a list of numbers that represents the meaning of text.

\`\`\`python
# "bank statement" in vector space (simplified — real vectors have 384+ dimensions)
"bank statement"    → [0.23, -0.81, 0.44, 0.12, ...]  # 384 numbers
"salary certificate" → [0.21, -0.79, 0.41, 0.15, ...]  # similar numbers = similar meaning
"pizza recipe"      → [-0.92, 0.33, -0.71, 0.88, ...]  # very different numbers
\`\`\`

## Why semantic search beats keyword search
\`\`\`
Keyword search for "proof of income":
✅ Finds: "proof of income letter"
❌ Misses: "salary certificate"  ← same meaning, different words
❌ Misses: "payslip"             ← same meaning, different words

Vector search for "proof of income":
✅ Finds: "proof of income letter"
✅ Finds: "salary certificate"   ← close in vector space
✅ Finds: "payslip"              ← close in vector space
✅ Finds: "employment letter"    ← related meaning
\`\`\`

## How a vector DB works
\`\`\`
1. STORE:  text → embedding model → vector → vector DB stores [text + vector]
2. QUERY:  question → embedding model → query vector
3. SEARCH: find stored vectors closest to query vector (cosine similarity)
4. RETURN: top-K most similar texts
\`\`\`

## Choosing a vector DB in 2026
| DB | Best for | Free? | Setup |
|---|---|---|---|
| **ChromaDB** | Local dev, fast prototyping | ✅ | pip install, in-memory |
| **Qdrant** | Production, filtering, large scale | ✅ Cloud free tier | Docker or cloud |
| **Pinecone** | Serverless, zero infra | Free tier (1 index) | API only |
| **pgvector** | Already using PostgreSQL | ✅ | Extension |
| **FAISS** | Maximum speed, no server | ✅ | pip install |

**Start with ChromaDB. Move to Qdrant when you need production.**

## The key metric: cosine similarity
\`\`\`
Score of 1.0  = identical meaning
Score of 0.8+ = very similar
Score of 0.5  = somewhat related
Score of 0.0  = completely unrelated
Score < 0     = opposite meaning
\`\`\`

## References
- 🔗 [ChromaDB quickstart](https://docs.trychroma.com/getting-started)
- 🔗 [Qdrant docs](https://qdrant.tech/documentation/)
- 🔗 [Vector DB comparison 2024](https://superlinked.com/vectorhub/vector-db-comparison)
`},

{title:'ChromaDB hands-on',desc:'Local vector DB — set up, insert, query, filter. Fastest to start.',time:'1 hr',tags:['ChromaDB','Practical'],content:`
## What you'll build
A searchable knowledge base of 10 banking FAQs using ChromaDB. Query it with natural language and get the most relevant answer back instantly.

## Prerequisites
\`\`\`bash
pip install chromadb==0.5.3 sentence-transformers==3.0.1
\`\`\`

## Step 1: Set up ChromaDB and add documents
\`\`\`python
import chromadb
from chromadb.utils import embedding_functions

# Use a local embedding model (free, no API key)
ef = embedding_functions.SentenceTransformerEmbeddingFunction(
    model_name="all-MiniLM-L6-v2"
)

# Create client and collection
client = chromadb.Client()  # in-memory (use PersistentClient for disk)
collection = client.create_collection(
    name="banking_faq",
    embedding_function=ef
)

# Add banking FAQs
faqs = [
    "The minimum salary requirement for a personal loan is AED 5,000 per month",
    "Loan applications take 3-5 business days to process after document submission",
    "You can prepay your loan after 12 months with a 1% early settlement fee",
    "The maximum loan amount is 20 times your monthly salary up to AED 1.5 million",
    "Required documents include Emirates ID, 3 months bank statements, and salary slips",
    "DBR limit for UAE nationals is 50%, for expatriates it is 45%",
    "Personal loans are available for tenors of 12 to 60 months",
    "Interest rate is calculated on reducing balance method starting from 5.99% per annum",
    "You must be between 21 and 65 years of age to apply for a personal loan",
    "Joint applications are allowed with a spouse as a co-applicant",
]

collection.add(
    documents=faqs,
    ids=[f"faq_{i}" for i in range(len(faqs))]
)
print(f"✅ Added {len(faqs)} documents to ChromaDB")
\`\`\`
**Expected output:**
\`\`\`
✅ Added 10 documents to ChromaDB
\`\`\`

## Step 2: Query with natural language
\`\`\`python
def search_faq(question: str, n_results: int = 3):
    results = collection.query(
        query_texts=[question],
        n_results=n_results
    )
    print(f"Query: '{question}'")
    print(f"Top {n_results} results:")
    for i, (doc, dist) in enumerate(zip(
        results['documents'][0],
        results['distances'][0]
    )):
        score = 1 - dist  # convert distance to similarity
        print(f"  {i+1}. [{score:.2f}] {doc}")
    print()

search_faq("What salary do I need to get a loan?")
search_faq("How long does loan approval take?")
search_faq("Can I pay back early?")
\`\`\`
**Expected output:**
\`\`\`
Query: 'What salary do I need to get a loan?'
Top 3 results:
  1. [0.91] The minimum salary requirement for a personal loan is AED 5,000 per month
  2. [0.74] The maximum loan amount is 20 times your monthly salary...
  3. [0.68] You must be between 21 and 65 years of age to apply...
\`\`\`

## Step 3: Filter by metadata
\`\`\`python
# Recreate with metadata for filtering
client2 = chromadb.Client()
col2 = client2.create_collection("faq_with_meta", embedding_function=ef)

col2.add(
    documents=faqs,
    ids=[f"faq_{i}" for i in range(len(faqs))],
    metadatas=[
        {"category": "eligibility"},
        {"category": "process"},
        {"category": "repayment"},
        {"category": "eligibility"},
        {"category": "documents"},
        {"category": "eligibility"},
        {"category": "eligibility"},
        {"category": "rates"},
        {"category": "eligibility"},
        {"category": "eligibility"},
    ]
)

# Query only eligibility FAQs
results = col2.query(
    query_texts=["age requirements"],
    n_results=2,
    where={"category": "eligibility"}  # filter!
)
print("Filtered to eligibility only:")
for doc in results['documents'][0]:
    print(f"  • {doc}")
\`\`\`
**Expected output:**
\`\`\`
Filtered to eligibility only:
  • You must be between 21 and 65 years of age to apply for a personal loan
  • The minimum salary requirement for a personal loan is AED 5,000 per month
\`\`\`

## ✅ Checkpoint
You can now store, search, and filter documents using vector similarity. This is the core of every RAG system.

## Common errors and fixes
- **Model download on first run** → Takes 2-3 min for 80MB model. Normal.
- **empty results** → collection.count() must be > 0 before querying
- **wrong similarity scores** → ChromaDB returns L2 distance by default; use cosine with \`metadata={"hnsw:space": "cosine"}\` on collection creation

## What to build next
Replace the in-memory client with \`chromadb.PersistentClient(path="./my_db")\` to save your data to disk between runs.

## References
- 🔗 [ChromaDB docs](https://docs.trychroma.com)
- 🔗 [ChromaDB GitHub](https://github.com/chroma-core/chroma)
- 🔗 [Sentence transformers models](https://www.sbert.net/docs/pretrained_models.html)
`},

{title:'Build your first LangChain chain',desc:'Connect LLM → prompt → output. Then add memory.',time:'1.5 hr',tags:['LangChain','Build'],content:`
## What you'll build
A loan eligibility checker agent that takes applicant details, runs them through a chain of checks, and produces a structured decision with reasoning. Your first real LangChain chain — not a hello world.

## Prerequisites
\`\`\`bash
pip install langchain==0.2.16 langchain-community==0.2.16 langchain-core==0.2.38
# Ollama for free local LLM: https://ollama.com → ollama pull llama3.2
\`\`\`

## Concept in 2 minutes
A LangChain "chain" is just: PromptTemplate → LLM → OutputParser. You define what goes in (variables), what the LLM should do (prompt), and what comes out (parsed format). Chain multiple of these together and you have an agent.

## Step 1: Your first chain
\`\`\`python
from langchain_community.llms import Ollama
from langchain_core.prompts import PromptTemplate
from langchain_core.output_parsers import StrOutputParser

# Create LLM
llm = Ollama(model="llama3.2")

# Create prompt template
prompt = PromptTemplate.from_template("""
You are a loan eligibility officer at a bank.

Applicant details:
- Monthly salary: {salary} AED
- Monthly existing obligations: {obligations} AED  
- Loan requested: {loan_amount} AED over {tenor} months

Calculate DBR = obligations / salary.
If DBR > 45%, REJECT. Otherwise, APPROVE with estimated monthly payment.
Give a 3-line decision with reason.
""")

# Create chain: prompt → LLM → string output
chain = prompt | llm | StrOutputParser()

# Run it
result = chain.invoke({
    "salary": 15000,
    "obligations": 4000,
    "loan_amount": 100000,
    "tenor": 36,
})
print(result)
\`\`\`
**Expected output:**
\`\`\`
DBR = 4000/15000 = 26.7% — within the 45% limit.
APPROVED: The applicant qualifies for the requested AED 100,000 loan.
Estimated monthly payment: AED 3,143 over 36 months at standard rates.
\`\`\`

## Step 2: Add memory (conversation history)
\`\`\`python
from langchain.memory import ConversationBufferWindowMemory
from langchain.chains import ConversationChain

memory = ConversationBufferWindowMemory(k=5)  # remember last 5 exchanges

convo = ConversationChain(llm=llm, memory=memory, verbose=False)

# Simulate a conversation with an applicant
responses = [
    convo.predict(input="My monthly salary is AED 20,000"),
    convo.predict(input="I have car loan payments of AED 3,000 per month"),
    convo.predict(input="I want to borrow AED 200,000 for 48 months. Am I eligible?"),
]
for r in responses:
    print(r)
    print("---")
\`\`\`
**Expected output:**
\`\`\`
Thank you, I've noted your monthly salary of AED 20,000.
---
Understood. That gives you AED 3,000 in existing monthly obligations.
---
With salary AED 20,000 and obligations AED 3,000, your DBR is 15%. 
Adding a AED 200,000 / 48-month loan (~AED 4,600/month) brings total DBR to 38% — 
within our 45% limit. You are eligible.
---
\`\`\`

## Step 3: Sequential chain (multi-step reasoning)
\`\`\`python
from langchain_core.prompts import ChatPromptTemplate

# Chain 1: Calculate eligibility
eligibility_prompt = ChatPromptTemplate.from_template(
    "Calculate loan eligibility: salary={salary}, obligations={obligations}, loan={loan}. Return: ELIGIBLE or INELIGIBLE with DBR percentage."
)

# Chain 2: Generate recommendation based on eligibility
recommendation_prompt = ChatPromptTemplate.from_template(
    "Based on this eligibility result: {eligibility_result}\nGenerate a professional customer-facing response in 2 sentences."
)

chain1 = eligibility_prompt | llm | StrOutputParser()
chain2 = recommendation_prompt | llm | StrOutputParser()

# Run sequentially
elig_result = chain1.invoke({"salary":12000,"obligations":3000,"loan":80000})
final_response = chain2.invoke({"eligibility_result": elig_result})
print("Step 1:", elig_result)
print("Step 2:", final_response)
\`\`\`

## Common errors and fixes
- **Ollama not running** → \`ollama serve\` in separate terminal
- **PromptTemplate variable mismatch** → variable names in \`{}\` must match keys in \`.invoke({})\`
- **Memory not persisting** → ConversationBufferWindowMemory is in-memory only. Use SQLiteMemory for persistence.

## What to build next
Add a tool: let the chain call a function to look up real interest rates before making a decision.

## References
- 🔗 [LangChain LCEL docs](https://python.langchain.com/docs/concepts/lcel/)
- 🔗 [LangChain memory](https://python.langchain.com/docs/concepts/memory/)
- 🔗 [LangChain cookbook](https://github.com/langchain-ai/langchain/tree/master/cookbook)
`},
],

langgraph:[
{title:'Why LangGraph over LangChain',desc:'State machines vs chains — when and why LangGraph wins',time:'30 min',tags:['Concept','LangGraph'],content:`
## The core difference in one line
**LangChain:** A → B → C (fixed sequence)
**LangGraph:** A → B → C or back to A or jump to E (stateful, conditional)

## When chains break down
Imagine a loan document review process:
\`\`\`
1. Receive documents
2. Check if all documents present
   → If missing: request missing docs (loop back to step 1)
   → If complete: proceed
3. Validate document authenticity
   → If fraud detected: escalate to compliance (branch)
   → If valid: proceed
4. Extract financial data
5. Calculate eligibility
   → If eligible: generate approval letter
   → If not: generate rejection with reason
\`\`\`

This has **loops** and **conditional branches**. A linear chain can't do this. LangGraph can.

## LangGraph's 3 core concepts

**Nodes** — functions that do work (call LLM, run calculation, check condition)
\`\`\`python
def check_documents(state): ...    # a node
def validate_docs(state): ...      # a node
def calculate_eligibility(state): ... # a node
\`\`\`

**Edges** — connections between nodes (fixed or conditional)
\`\`\`python
graph.add_edge("check_documents", "validate_docs")  # always go here
graph.add_conditional_edges("validate_docs", decide_next,  # go here based on output
    {"valid": "calculate_eligibility", "fraud": "escalate"})
\`\`\`

**State** — shared memory that all nodes can read and write
\`\`\`python
class LoanState(TypedDict):
    documents: list
    is_complete: bool
    is_valid: bool
    eligibility: str
    decision: str
\`\`\`

## The market view
LangGraph is the **most in-demand agentic AI skill in 2026** because enterprises need agents that can:
- Loop until a condition is met
- Branch based on data
- Handle errors and retry
- Run multiple agents in parallel

Linear chains can't do any of this reliably.

{title:'Build a document review agent with LangGraph',desc:'Multi-step: receive → validate → extract → decide. With real conditional logic.',time:'3 hr',tags:['LangGraph','Real project','Build'],content:`
## What you'll build
A loan document review agent that: checks if all required documents are present, validates each one, extracts key financial data, and makes an eligibility decision — with proper conditional branching and state management.

## Prerequisites
\`\`\`bash
pip install langgraph==0.2.28 langchain==0.2.16 langchain-community==0.2.16
# Ollama: ollama pull llama3.2
\`\`\`

## Step 1: Define the state
\`\`\`python
from typing import TypedDict, List, Optional
from langgraph.graph import StateGraph, END

class LoanReviewState(TypedDict):
    # Input
    applicant_name: str
    submitted_docs: List[str]
    
    # Computed during review
    missing_docs: List[str]
    validation_errors: List[str]
    extracted_data: dict
    
    # Decision
    decision: str           # APPROVED / REJECTED / PENDING
    decision_reason: str
    next_step: str          # controls flow
\`\`\`

## Step 2: Define the nodes
\`\`\`python
import requests, json

REQUIRED_DOCS = ["emirates_id", "bank_statement", "salary_slip", "employment_letter"]

def call_llm(prompt: str) -> str:
    r = requests.post("http://localhost:11434/api/generate",
        json={"model": "llama3.2", "prompt": prompt, "stream": False})
    return r.json()["response"]

# Node 1: Check document completeness
def check_completeness(state: LoanReviewState) -> LoanReviewState:
    submitted = [d.lower().replace(" ", "_") for d in state["submitted_docs"]]
    missing = [doc for doc in REQUIRED_DOCS if doc not in submitted]
    
    state["missing_docs"] = missing
    state["next_step"] = "incomplete" if missing else "validate"
    
    print(f"📋 Completeness check: {'PASS' if not missing else f'FAIL — missing: {missing}'}")
    return state

# Node 2: Validate documents
def validate_documents(state: LoanReviewState) -> LoanReviewState:
    errors = []
    
    prompt = f"""You are a document validator. The applicant has submitted: {state['submitted_docs']}.
Check for obvious issues (expired docs, mismatched names, etc.).
Return JSON only: {{"errors": ["list of issues"], "is_valid": true/false}}"""
    
    response = call_llm(prompt)
    try:
        result = json.loads(response)
        errors = result.get("errors", [])
    except:
        errors = []  # if LLM returns non-JSON, assume valid
    
    state["validation_errors"] = errors
    state["next_step"] = "fraud_check" if errors else "extract"
    
    print(f"✅ Validation: {'ISSUES FOUND' if errors else 'PASS'}")
    return state

# Node 3: Extract financial data
def extract_data(state: LoanReviewState) -> LoanReviewState:
    prompt = f"""Extract financial data from these submitted documents: {state['submitted_docs']}
Simulate realistic data extraction. Return JSON only:
{{"monthly_salary": 15000, "existing_obligations": 3000, "employer": "ABC Corp", "employment_years": 3}}"""
    
    response = call_llm(prompt)
    try:
        data = json.loads(response)
    except:
        data = {"monthly_salary": 15000, "existing_obligations": 3000}
    
    state["extracted_data"] = data
    state["next_step"] = "decide"
    
    print(f"📊 Extracted: salary={data.get('monthly_salary')}, obligations={data.get('existing_obligations')}")
    return state

# Node 4: Make eligibility decision
def make_decision(state: LoanReviewState) -> LoanReviewState:
    data = state["extracted_data"]
    salary = data.get("monthly_salary", 0)
    obligations = data.get("existing_obligations", 0)
    
    dbr = obligations / salary if salary > 0 else 1
    
    if dbr <= 0.45:
        state["decision"] = "APPROVED"
        state["decision_reason"] = f"DBR of {dbr:.1%} is within the 45% limit. Applicant qualifies."
    else:
        state["decision"] = "REJECTED"
        state["decision_reason"] = f"DBR of {dbr:.1%} exceeds the 45% maximum limit."
    
    state["next_step"] = "done"
    print(f"🏦 Decision: {state['decision']} — {state['decision_reason']}")
    return state

# Node 5: Handle incomplete documents
def request_documents(state: LoanReviewState) -> LoanReviewState:
    state["decision"] = "PENDING"
    state["decision_reason"] = f"Missing documents: {', '.join(state['missing_docs'])}. Please resubmit."
    state["next_step"] = "done"
    print(f"📬 Requesting missing docs: {state['missing_docs']}")
    return state
\`\`\`

## Step 3: Build the graph
\`\`\`python
def route_after_completeness(state: LoanReviewState) -> str:
    return state["next_step"]  # "incomplete" or "validate"

def route_after_validation(state: LoanReviewState) -> str:
    return state["next_step"]  # "extract" or "fraud_check"

# Build the graph
graph = StateGraph(LoanReviewState)

# Add nodes
graph.add_node("check_completeness", check_completeness)
graph.add_node("validate_documents", validate_documents)
graph.add_node("extract_data", extract_data)
graph.add_node("make_decision", make_decision)
graph.add_node("request_documents", request_documents)

# Set entry point
graph.set_entry_point("check_completeness")

# Add edges
graph.add_conditional_edges("check_completeness", route_after_completeness, {
    "incomplete": "request_documents",
    "validate": "validate_documents"
})
graph.add_conditional_edges("validate_documents", route_after_validation, {
    "extract": "extract_data",
    "fraud_check": "request_documents"  # simplified — would be a separate node
})
graph.add_edge("extract_data", "make_decision")
graph.add_edge("make_decision", END)
graph.add_edge("request_documents", END)

# Compile
agent = graph.compile()
print("✅ LangGraph agent compiled")
\`\`\`

## Step 4: Run the agent
\`\`\`python
# Test 1: Complete application
print("\\n=== TEST 1: Complete application ===")
result1 = agent.invoke({
    "applicant_name": "Ahmed Al-Rashidi",
    "submitted_docs": ["emirates_id", "bank_statement", "salary_slip", "employment_letter"],
    "missing_docs": [], "validation_errors": [], "extracted_data": {},
    "decision": "", "decision_reason": "", "next_step": ""
})
print(f"Final: {result1['decision']} — {result1['decision_reason']}")

# Test 2: Incomplete application  
print("\\n=== TEST 2: Missing documents ===")
result2 = agent.invoke({
    "applicant_name": "Sara Mohammed",
    "submitted_docs": ["emirates_id", "salary_slip"],  # missing bank_statement + employment_letter
    "missing_docs": [], "validation_errors": [], "extracted_data": {},
    "decision": "", "decision_reason": "", "next_step": ""
})
print(f"Final: {result2['decision']} — {result2['decision_reason']}")
\`\`\`
**Expected output:**
\`\`\`
=== TEST 1: Complete application ===
📋 Completeness check: PASS
✅ Validation: PASS
📊 Extracted: salary=15000, obligations=3000
🏦 Decision: APPROVED — DBR of 20.0% is within the 45% limit.
Final: APPROVED — DBR of 20.0% is within the 45% limit.

=== TEST 2: Missing documents ===
📋 Completeness check: FAIL — missing: ['bank_statement', 'employment_letter']
📬 Requesting missing docs: ['bank_statement', 'employment_letter']
Final: PENDING — Missing documents: bank_statement, employment_letter.
\`\`\`

## ✅ You now have a working multi-step AI agent
This is the same architecture used in enterprise AI workflow systems. The nodes are LLM calls + business logic. The edges are your business rules.

## Common errors and fixes
- **StateGraph import error** → \`pip install langgraph==0.2.28\` exactly — versions change fast
- **Routing function returns wrong key** → The dict in add_conditional_edges must match all possible return values
- **Infinite loop** → Always make sure a node sets a terminal \`next_step\` that leads to END

## What to build next
Add a parallel node: run document extraction and fraud check simultaneously using \`graph.add_node\` with async functions.

## References
- 🔗 [LangGraph quickstart](https://langchain-ai.github.io/langgraph/tutorials/introduction/)
- 🔗 [LangGraph how-to guides](https://langchain-ai.github.io/langgraph/how-tos/)
- 🔗 [LangGraph examples GitHub](https://github.com/langchain-ai/langgraph/tree/main/examples)
`},

## What you'll build
A production-ready FastAPI service that wraps an LLM — with streaming responses, proper error handling, request validation, and health checks. The exact pattern used in real AI microservices.

## Prerequisites
\`\`\`bash
pip install fastapi==0.111.0 uvicorn==0.30.1 pydantic==2.7.4 httpx==0.27.0
\`\`\`

## Step 1: Basic FastAPI + LLM endpoint
\`\`\`python
# main.py
from fastapi import FastAPI, HTTPException
from pydantic import BaseModel
import requests, json

app = FastAPI(title="Loan AI API", version="1.0.0")

class LoanQuery(BaseModel):
    question: str
    applicant_id: str = "unknown"
    
class AIResponse(BaseModel):
    answer: str
    model: str
    applicant_id: str

def call_llm(prompt: str) -> str:
    try:
        r = requests.post("http://localhost:11434/api/generate",
            json={"model": "llama3.2", "prompt": prompt, "stream": False},
            timeout=30)
        return r.json()["response"]
    except Exception as e:
        raise HTTPException(status_code=503, detail=f"LLM unavailable: {str(e)}")

@app.get("/health")
def health():
    return {"status": "ok", "service": "loan-ai"}

@app.post("/ask", response_model=AIResponse)
def ask(query: LoanQuery):
    prompt = f"You are a loan advisor. Answer concisely: {query.question}"
    answer = call_llm(prompt)
    return AIResponse(answer=answer, model="llama3.2", applicant_id=query.applicant_id)
\`\`\`
\`\`\`bash
# Run it
uvicorn main:app --reload --port 8000

# Test it
curl -X POST http://localhost:8000/ask \\
  -H "Content-Type: application/json" \\
  -d '{"question": "What is DBR?", "applicant_id": "APP001"}'
\`\`\`
**Expected output:**
\`\`\`json
{
  "answer": "DBR (Debt Burden Ratio) is the percentage of your gross monthly salary...",
  "model": "llama3.2",
  "applicant_id": "APP001"
}
\`\`\`

## Step 2: Streaming responses (essential for LLMs)
\`\`\`python
from fastapi.responses import StreamingResponse
import asyncio

@app.post("/ask/stream")
async def ask_stream(query: LoanQuery):
    async def generate():
        # Stream from Ollama
        with requests.post("http://localhost:11434/api/generate",
            json={"model": "llama3.2", "prompt": query.question, "stream": True},
            stream=True) as r:
            for line in r.iter_lines():
                if line:
                    chunk = json.loads(line)
                    if not chunk.get("done"):
                        yield chunk.get("response", "")
    
    return StreamingResponse(generate(), media_type="text/plain")
\`\`\`
\`\`\`bash
# Test streaming
curl -X POST http://localhost:8000/ask/stream \\
  -H "Content-Type: application/json" \\
  -d '{"question": "Explain loan eligibility in 3 points"}' \\
  --no-buffer
\`\`\`

## Step 3: Add middleware, logging, and rate limiting
\`\`\`python
from fastapi.middleware.cors import CORSMiddleware
import time, logging

logging.basicConfig(level=logging.INFO)
logger = logging.getLogger(__name__)

app.add_middleware(CORSMiddleware,
    allow_origins=["*"], allow_methods=["*"], allow_headers=["*"])

@app.middleware("http")
async def log_requests(request, call_next):
    start = time.time()
    response = await call_next(request)
    duration = time.time() - start
    logger.info(f"{request.method} {request.url.path} → {response.status_code} ({duration:.2f}s)")
    return response
\`\`\`

## ✅ Production-ready patterns summary
- Use \`response_model=\` for automatic response validation
- Always set \`timeout=\` on external calls
- Log every request with timing
- \`/health\` endpoint for load balancer checks
- Use \`HTTPException\` not bare exceptions

## Common errors and fixes
- **422 Unprocessable Entity** → Request body doesn't match Pydantic model. Check field names.
- **Streaming cuts off** → Add \`--no-buffer\` to curl. In production use SSE with proper headers.
- **CORS blocked** → Add CORSMiddleware before routes are added

## References
- 🔗 [FastAPI docs](https://fastapi.tiangolo.com)
- 🔗 [FastAPI best practices](https://github.com/zhanymkanov/fastapi-best-practices)
- 🔗 [Uvicorn deployment](https://www.uvicorn.org/deployment/)

function show(id){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-'+id).classList.add('on');
  curSection=id;
}

function goHome(){
  show('home');
  document.getElementById('tb-title').textContent='Dashboard';
  document.getElementById('tb-tag').textContent='AI Engineering Lab';
  document.getElementById('tb-tag').className='tag tb';
}

function goSearch(){
  show('search');
  document.getElementById('tb-title').textContent='Search labs';
  setTimeout(()=>document.getElementById('search-in').focus(),100);
}

function goBackToTrack(){ if(curTrack) showTrack(curTrack); }

function showTrack(tid){
  curTrack=tid;
  const meta=TRACKS_META[tid];
  const labs=LABS[tid]||[];
  show('track');
  document.getElementById('bc-track').textContent=meta.name;
  document.getElementById('track-title').textContent=meta.icon+' '+meta.name;
  document.getElementById('track-desc').textContent=meta.desc;
  document.getElementById('tb-title').textContent=meta.name;

  const list=document.getElementById('labs-list');
  list.innerHTML='<div style="font-size:12px;color:var(--text3);margin-bottom:12px">Tap a lab to open it. Content loads instantly — no internet required.</div>';
  labs.forEach((lab,i)=>{
    const isDone=done.includes(tid+'_'+i);
    const div=document.createElement('div');
    div.className='lab-item'+(isDone?' lab-done':'');
    div.onclick=()=>openLab(tid,i);
    div.innerHTML=`<div class="lab-num">Lab ${i+1}</div>
      <div class="lab-info">
        <div class="lab-title">${isDone?'✅ ':''}${lab.title}</div>
        <div class="lab-desc-sm">${lab.desc}</div>
        <div class="lab-tags">${lab.tags.map(t=>`<span class="tag tb" style="font-size:10px;padding:2px 6px">${t}</span>`).join('')} <span style="font-size:11px;color:var(--text3)">${lab.time}</span></div>
      </div>`;
    list.appendChild(div);
  });
}

function openLab(tid,idx){
  curTrack=tid; curLabIdx=idx;
  const meta=TRACKS_META[tid];
  const lab=LABS[tid][idx];
  show('lab');
  document.getElementById('bc-t').textContent=meta.name;
  document.getElementById('bc-l').textContent=lab.title;
  document.getElementById('lab-h').textContent=lab.title;
  document.getElementById('lab-d').textContent=lab.desc;
  document.getElementById('tb-title').textContent=lab.title;
  document.getElementById('lab-meta').innerHTML=
    lab.tags.map(t=>`<span class="tag tb">${t}</span>`).join('')+
    `<span class="tag ta">${lab.time}</span>`;

  const isDone=done.includes(tid+'_'+idx);
  document.getElementById('done-btn').textContent=isDone?'✅ Completed':'✓ Mark complete';

  renderMD(lab.content, document.getElementById('lab-body'));
}

function nextLab(){
  const labs=LABS[curTrack]||[];
  if(curLabIdx+1<labs.length) openLab(curTrack,curLabIdx+1);
  else showTrack(curTrack);
}

function markDone(){
  const key=curTrack+'_'+curLabIdx;
  if(!done.includes(key)){done.push(key);localStorage.setItem('ailab_done',JSON.stringify(done));}
  document.getElementById('done-btn').textContent='✅ Completed';
  updateProgress();
}

// ── SEARCH ───────────────────────────────────────────────────────────
function doSearch(q){
  const res=document.getElementById('search-results');
  if(!q){res.innerHTML='';return;}
  q=q.toLowerCase();
  const matches=[];
  Object.entries(LABS).forEach(([tid,labs])=>{
    labs.forEach((lab,i)=>{
      if(lab.title.toLowerCase().includes(q)||lab.desc.toLowerCase().includes(q)||lab.tags.some(t=>t.toLowerCase().includes(q))||lab.content.toLowerCase().includes(q)){
        matches.push({tid,i,lab});
      }
    });
  });
  if(!matches.length){res.innerHTML='<div style="color:var(--text3);font-size:13px;padding:10px 0">No labs found for "'+q+'"</div>';return;}
  res.innerHTML=matches.map(({tid,i,lab})=>`
    <div class="lab-item" onclick="openLab('${tid}',${i})">
      <div class="lab-num">${TRACKS_META[tid].icon}</div>
      <div class="lab-info">
        <div class="lab-title">${lab.title}</div>
        <div class="lab-desc-sm">${TRACKS_META[tid].name} · ${lab.time}</div>
        <div class="lab-tags">${lab.tags.map(t=>`<span class="tag tb" style="font-size:10px;padding:2px 6px">${t}</span>`).join('')}</div>
      </div>
    </div>`).join('');
}

// ── MARKDOWN RENDERER ─────────────────────────────────────────────────
function renderMD(text,el){
  let h=text.trim()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w+)?\n?([\s\S]*?)```/g,(_,lang,code)=>`<pre><button class="copy-btn" onclick="cpCode(this)">Copy</button><code>${code.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^\| (.+)$/gm,'<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:12px">$1</table></div>')
    .replace(/^[\-\*] (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,s=>`<ul style="margin:8px 0 10px 18px">${s}</ul>`)
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  el.innerHTML='<p>'+h+'</p>';
  addCopyBtns(el);
}

function addCopyBtns(el){
  el.querySelectorAll('pre').forEach(pre=>{
    const btn=pre.querySelector('.copy-btn');
    if(btn) btn.onclick=function(){
      navigator.clipboard.writeText(pre.querySelector('code').textContent);
      btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',2000);
    };
  });
}

function cpCode(btn){
  navigator.clipboard.writeText(btn.nextElementSibling.textContent);
  btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',2000);
}

// ── PROGRESS & HOME ───────────────────────────────────────────────────
function updateProgress(){
  const total=Object.values(LABS).reduce((s,l)=>s+l.length,0);
  document.getElementById('prog-n').textContent=done.length;
  document.getElementById('prog-t').textContent=total;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-done').textContent=done.length;
  document.getElementById('prog-fill').style.width=Math.round(done.length/total*100)+'%';
}

function buildHomeGrid(){
  const grid=document.getElementById('home-tracks');
  const colors={python:'var(--amber)',rag:'var(--accent)',vectordb:'var(--green)',langchain:'var(--accent2)',langgraph:'var(--red)',mlops:'var(--amber)',projects:'var(--green)'};
  grid.innerHTML=Object.entries(TRACKS_META).map(([tid,meta])=>`
    <div class="track-card" onclick="showTrack('${tid}')">
      <div class="tc-icon">${meta.icon}</div>
      <div class="tc-title">${meta.name}</div>
      <div class="tc-desc">${meta.desc}</div>
      <div style="margin-top:8px;font-size:11px;color:${colors[tid]||'var(--accent)'};font-weight:600">${LABS[tid]?.length||0} labs</div>
    </div>`).join('');
}

function setMobActive(idx){
  document.querySelectorAll('.mob-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
}

buildHomeGrid();
updateProgress();
</script>
</body>
